<!DOCTYPE html>
<html>
<head>
<title>Boy Shooting Game</title>
<style>
body{
  background:#111;
  color:white;
  text-align:center;
  font-family:Arial;
}
canvas{
  background:#222;
  display:block;
  margin:auto;
  border:3px solid white;
}
button{
  padding:10px;
  font-size:18px;
  margin:5px;
}
</style>
</head>
<body>

<h1>🎮 Boy Shooting Game</h1>
<button onclick="startGame()">Start Game</button>
<button onclick="restartGame()">Restart</button>

<canvas id="game" width="800" height="400"></canvas>

<h2 id="score">Score: 0</h2>
<h2 id="health">Health: 100</h2>

<audio id="bgMusic" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

let gameStart=false
let score=0
let health=100

let player={
  x:50,
  y:180,
  speed:6
}

let bullets=[]
let enemies=[]
let explosions=[]

let keys={}
let lastShot=0
let shootDelay=200   // shooting rate control

document.addEventListener("keydown",e=>{ keys[e.key]=true })
document.addEventListener("keyup",e=>{ keys[e.key]=false })

function startGame(){
  gameStart=true
  spawnEnemy()
  document.getElementById("bgMusic").play()
}

function restartGame(){
  score=0
  health=100
  bullets=[]
  enemies=[]
  explosions=[]
  player.x=50
  player.y=180
  document.getElementById("score").innerText="Score: 0"
  document.getElementById("health").innerText="Health: 100"
  gameStart=true
}

function spawnEnemy(){
  setInterval(()=>{
    if(gameStart){
      enemies.push({
        x:750,
        y:Math.random()*350,
        speed:2
      })
    }
  },2000) // every 2 sec new enemy
}

function shoot(){
  let now = Date.now()
  if(now - lastShot > shootDelay){
    bullets.push({x:player.x+40, y:player.y+15, speed:8})
    lastShot = now
  }
}

function movePlayer(){
  if(keys["ArrowUp"] && player.y>0) player.y-=player.speed
  if(keys["ArrowDown"] && player.y<360) player.y+=player.speed
}

function collision(a,b){
  return (
    a.x<b.x+30 &&
    a.x+12>b.x &&
    a.y<b.y+30 &&
    a.y+12>b.y
  )
}

function update(){
  if(!gameStart) return

  movePlayer()

  if(keys[" "]) shoot()

  // move bullets
  bullets.forEach(b=>b.x+=b.speed)

  // move enemies
  enemies.forEach(e=>e.x-=e.speed)

  // bullets hit enemy
  bullets.forEach((b,bi)=>{
    enemies.forEach((e,ei)=>{
      if(collision(b,e)){
        score++
        document.getElementById("score").innerText="Score: "+score
        explosions.push({x:e.x+15,y:e.y+15,size:10,time:20})
        bullets.splice(bi,1)
        enemies.splice(ei,1)
      }
    })
  })

  // enemy reach player
  enemies.forEach((e,ei)=>{
    if(collision(e,player)){
      health-=10
      document.getElementById("health").innerText="Health: "+health
      enemies.splice(ei,1)
    }
  })

  if(health<=0) gameStart=false
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height)

  if(!gameStart){
    ctx.fillStyle="white"
    ctx.font="40px Arial"
    ctx.fillText("GAME OVER",300,200)
    return
  }

  // draw player
  ctx.font="40px Arial"
  ctx.fillText("🧍",player.x,player.y)

  // draw bullets
  bullets.forEach(b=>{
    ctx.fillStyle="yellow"
    ctx.fillRect(b.x,b.y,12,4)
  })

  // draw enemies
  enemies.forEach(e=>{
    ctx.font="40px Arial"
    ctx.fillText("👾",e.x,e.y)
  })

  // draw explosions
  explosions.forEach((ex,i)=>{
    ctx.fillStyle="orange"
    ctx.beginPath()
    ctx.arc(ex.x,ex.y,ex.size,0,Math.PI*2)
    ctx.fill()
    ex.size+=2
    ex.time--
    if(ex.time<=0) explosions.splice(i,1)
  })
}

function gameLoop(){
  update()
  draw()
  requestAnimationFrame(gameLoop)
}

gameLoop()
</script>

</body>
</html>
